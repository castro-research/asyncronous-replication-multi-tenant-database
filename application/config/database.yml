# PostgreSQL, one physical instance per node in the replication topology.
#
#   primary (default) = DB0 -> source of truth for the public tables (France)
#   db1, db2, db3           -> regional replicas of the public tables (PT/ES/PT)
#
# A single process connects to all four (see ApplicationRecord.connects_to). The
# source writes on :default; the consumer applies a replicated change on the
# right node with ConnectionSwitcher.switch_shard(<subdomain>). `subdomain`
# (carried in the Kafka header) is the shard name.
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("POSTGRES_USER", "postgres") %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", "dev") %>

# On the host each node is localhost on a distinct port; inside docker-compose
# each is a service hostname on the internal 5432. Override per connection.
<% db0_host = ENV.fetch("DB0_HOST", "localhost") %>
<% db1_host = ENV.fetch("DB1_HOST", "localhost") %>
<% db2_host = ENV.fetch("DB2_HOST", "localhost") %>
<% db3_host = ENV.fetch("DB3_HOST", "localhost") %>
<% db0_port = ENV.fetch("DB0_PORT", "5440") %>
<% db1_port = ENV.fetch("DB1_PORT", "5433") %>
<% db2_port = ENV.fetch("DB2_PORT", "5434") %>
<% db3_port = ENV.fetch("DB3_PORT", "5435") %>

development:
  primary:
    <<: *default
    database: replicateable_db0_development
    host: <%= db0_host %>
    port: <%= db0_port %>
  db1:
    <<: *default
    database: replicateable_db1_development
    host: <%= db1_host %>
    port: <%= db1_port %>
    migrations_paths: db/migrate
  db2:
    <<: *default
    database: replicateable_db2_development
    host: <%= db2_host %>
    port: <%= db2_port %>
    migrations_paths: db/migrate
  db3:
    <<: *default
    database: replicateable_db3_development
    host: <%= db3_host %>
    port: <%= db3_port %>
    migrations_paths: db/migrate
  # DB4 Context:
  # Simulate a not-properly-configured node. It is not a separate database: it
  # points at db3's physical instance but at a schema (db4) that does not own the
  # public tables, so the replicated table is absent there. database_tasks: false
  # so migrations never run against it. Producing to it must skip gracefully.
  db4:
    <<: *default
    database: replicateable_db3_development
    host: <%= db3_host %>
    port: <%= db3_port %>
    schema_search_path: "db4"
    database_tasks: false

# In test the four connections share one physical database. Specs use
# karafka-testing (no broker); switch_shard still changes the active shard so the
# replication gate (current_shard == :default) is exercised, while a single DB is
# enough to assert that a consumer applied the change. Only :default owns schema.
test:
  primary:
    <<: *default
    database: replicateable_test<%= ENV["TEST_ENV_NUMBER"] %>
    host: <%= db0_host %>
    port: <%= db0_port %>
  db1:
    <<: *default
    database: replicateable_test<%= ENV["TEST_ENV_NUMBER"] %>
    host: <%= db0_host %>
    port: <%= db0_port %>
    database_tasks: false
  db2:
    <<: *default
    database: replicateable_test<%= ENV["TEST_ENV_NUMBER"] %>
    host: <%= db0_host %>
    port: <%= db0_port %>
    database_tasks: false
  db3:
    <<: *default
    database: replicateable_test<%= ENV["TEST_ENV_NUMBER"] %>
    host: <%= db0_host %>
    port: <%= db0_port %>
    database_tasks: false
  # A not-properly-configured node: it shares the physical DB but points at a
  # schema (db4) that does not own the public tables, so the replicated table is
  # absent. Producing to it must skip gracefully (see table-existence guard).
  db4:
    <<: *default
    database: replicateable_test<%= ENV["TEST_ENV_NUMBER"] %>
    host: <%= db0_host %>
    port: <%= db0_port %>
    schema_search_path: "db4"
    database_tasks: false

production:
  primary:
    <<: *default
    database: replicateable_db0_production
    host: <%= db0_host %>
    port: <%= db0_port %>
  db1:
    <<: *default
    database: replicateable_db1_production
    host: <%= db1_host %>
    port: <%= db1_port %>
  db2:
    <<: *default
    database: replicateable_db2_production
    host: <%= db2_host %>
    port: <%= db2_port %>
  db3:
    <<: *default
    database: replicateable_db3_production
    host: <%= db3_host %>
    port: <%= db3_port %>
